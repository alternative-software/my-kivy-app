name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk cmake clang libssl-dev
          pip3 install --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          # Команда 'yes |' автоматически принимает все лицензии, которые просит Buildozer
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
